<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 2.5rem;
        }

        .clocks {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
        }

        .clock-card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 1.8rem 2rem;
            min-width: 280px;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .clock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .clock-card.tokyo::before { background: linear-gradient(90deg, #ff6b6b, #ee5a24); }
        .clock-card.la::before { background: linear-gradient(90deg, #4ecdc4, #2196f3); }
        .clock-card.barcelona::before { background: linear-gradient(90deg, #f9ca24, #f0932b); }

        .city-name {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 0.3rem;
        }

        .country {
            font-size: 0.7rem;
            color: #555;
            margin-bottom: 1.2rem;
        }

        .time {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 0.15rem;
            font-variant-numeric: tabular-nums;
        }

        .ampm {
            font-size: 1rem;
            font-weight: 500;
            color: #888;
            margin-left: 0.3rem;
        }

        .seconds {
            font-size: 1.2rem;
            font-weight: 400;
            color: #555;
            margin-left: 0.15rem;
        }

        .date-line {
            font-size: 0.95rem;
            color: #aaa;
            margin-top: 0.8rem;
            font-weight: 400;
        }

        .day-line {
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .badge {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        .badge.workday {
            background: #1a3a2a;
            color: #4ecdc4;
        }

        .badge.weekend {
            background: #3a2a1a;
            color: #f0932b;
        }

        .offset {
            font-size: 0.75rem;
            color: #444;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid #1e1e1e;
        }

        @media (max-width: 600px) {
            .clocks { flex-direction: column; }
            .clock-card { min-width: unset; }
            .time { font-size: 2.4rem; }
            body { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>
    <h1>World Clock</h1>
    <div class="clocks">
        <div class="clock-card tokyo" id="clock-tokyo">
            <div class="city-name">Tokyo</div>
            <div class="country">Japan</div>
            <div class="time" id="time-tokyo"></div>
            <div class="date-line" id="date-tokyo"></div>
            <div class="day-line" id="day-tokyo"></div>
            <div class="offset" id="offset-tokyo"></div>
        </div>
        <div class="clock-card la" id="clock-la">
            <div class="city-name">Los Angeles</div>
            <div class="country">United States</div>
            <div class="time" id="time-la"></div>
            <div class="date-line" id="date-la"></div>
            <div class="day-line" id="day-la"></div>
            <div class="offset" id="offset-la"></div>
        </div>
        <div class="clock-card barcelona" id="clock-barcelona">
            <div class="city-name">Barcelona</div>
            <div class="country">Spain</div>
            <div class="time" id="time-barcelona"></div>
            <div class="date-line" id="date-barcelona"></div>
            <div class="day-line" id="day-barcelona"></div>
            <div class="offset" id="offset-barcelona"></div>
        </div>
    </div>

    <script>
        const zones = [
            { id: 'tokyo', tz: 'Asia/Tokyo' },
            { id: 'la', tz: 'America/Los_Angeles' },
            { id: 'barcelona', tz: 'Europe/Madrid' },
        ];

        const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June',
                        'July', 'August', 'September', 'October', 'November', 'December'];

        function update() {
            const now = new Date();

            zones.forEach(zone => {
                const opts = { timeZone: zone.tz };

                // Get parts
                const parts = new Intl.DateTimeFormat('en-US', {
                    ...opts,
                    hour: 'numeric', minute: '2-digit', second: '2-digit',
                    hour12: true,
                    weekday: 'long',
                    year: 'numeric', month: 'long', day: 'numeric',
                }).formatToParts(now);

                const get = type => parts.find(p => p.type === type)?.value || '';

                const hour = get('hour');
                const minute = get('minute');
                const second = get('second');
                const ampm = get('dayPeriod');
                const weekday = get('weekday');
                const month = get('month');
                const day = get('day');
                const year = get('year');

                // Time
                document.getElementById(`time-${zone.id}`).innerHTML =
                    `${hour}:${minute}<span class="seconds">:${second}</span> <span class="ampm">${ampm}</span>`;

                // Date
                document.getElementById(`date-${zone.id}`).textContent =
                    `${month} ${day}, ${year}`;

                // Day + workday/weekend
                const dayIndex = DAYS.indexOf(weekday);
                const isWorkday = dayIndex >= 1 && dayIndex <= 5;

                document.getElementById(`day-${zone.id}`).innerHTML =
                    `${weekday} <span class="badge ${isWorkday ? 'workday' : 'weekend'}">${isWorkday ? 'Workday' : 'Weekend'}</span>`;

                // UTC offset
                const formatter = new Intl.DateTimeFormat('en-US', {
                    ...opts,
                    timeZoneName: 'longOffset',
                });
                const tzPart = formatter.formatToParts(now).find(p => p.type === 'timeZoneName');
                document.getElementById(`offset-${zone.id}`).textContent = tzPart?.value || '';
            });
        }

        update();
        setInterval(update, 1000);
    </script>
</body>
</html>
